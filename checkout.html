<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="img/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css" type="text/css">
    <link rel="stylesheet" href="style/checkout.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Оформление заказа - Prostranstvo</title>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
<div class="left">
                <a href="support.html">Поддержка</a>
                <a href="otzivi.html">Отзывы</a>
            </div>

            <div class="logo">
                <a href="index.html"><img src="img/logo1.png" alt=""></a>
            </div>
            <div class="right">
                <div class="search">
                    <input type="checkbox" id="searchToggle" class="searchToggle" />
                    <label for="searchToggle" class="searchButton"></label>
                    <input type="text" class="searchInput" placeholder="Поиск..." />
                    <button class="submitButton"></button>
                </div>
                <div class="cart">
                    <div class="cartButton"></div>
                    <div class="cartDropdown">
                        <p>Корзина пуста</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="checkout-container">
                <div class="checkout-form">
                    <h2>Данные покупателя</h2>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label for="fullname">ФИО</label>
                            <input type="text" id="fullname" name="fullname" required placeholder="Иван Иванович Иванов">
                        </div>
                        <div class="form-group">
                            <label for="address">Адрес доставки</label>
                            <input type="text" id="address" name="address" required placeholder="г. Москва, ул. Примерная, д. 1, кв. 1">
                        </div>
                        <div class="form-group">
                            <label for="phone">Номер телефона</label>
                            <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 000-00-00">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="example@mail.com">
                        </div>
                        <div class="form-group">
                            <label for="postalCode">Почтовый индекс</label>
                            <input type="text" id="postalCode" name="postalCode" placeholder="123456">
                        </div>
                        <button type="submit" class="submit-order-btn">Подтвердить заказ</button>
                    </form>
                </div>

                <div class="checkout-summary">
                    <h2>Ваш заказ</h2>
                    <div id="checkout-items-list" class="checkout-items">
                        <!-- Items will be injected here -->
                    </div>
                    <div id="checkout-total-price" class="checkout-total">
                        <!-- Total will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container header-inner">
            <div class="footer-top">
                <div class="footer-col">
                    <h3><a href="index.html"><img src="img/logo1.png"></a></h3>
                    <p>© 2025 Prostranstvo. Все права защищены</p>
                    <p>ИП Бубенцов И.А. ИНН: 213002160208</p>
                    <p><a href="#">Пользовательское соглашение</a></p>
                </div>
                <div class="footer-col">
                    <h3>Каталог</h3>
                    <a href="#" class="filter-btn" data-filter="all">Все</a>
                    <a href="#" class="filter-btn" data-filter="Odezda">Одежда</a>
                    <a href="#" class="filter-btn" data-filter="tovari">Сопутствующие товары</a>
                </div>
                <div class="footer-col">
                    <h3>Покупателям</h3>
                    <a href="support.html">Поддержка</a>
                    <a href="otzivi.html">Отзывы</a>
                </div>
                <div class="footer-col">
                    <h3>Связь с нами</h3>
                    <a href="mailto:Prostranstvo@gmail.com">Prostranstvo@gmail.com</a>
                    <div class="social">
                        <a href="#"><img src="img/tg1.png"></a>
                        <a href="#"><img src="img/vk1.png"></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="scripts/products.js"></script>
    <script src="scripts/checkout.js"></script>
</body>

</html>
