<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="img/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Оформление заказа - Gaiti Shop</title>
    <style>
        h2{
            margin-bottom: 20px;
        }
        .checkout-container {
            display: flex;
            gap: 40px;
            padding: 40px 0;
            align-items: flex-start;
        }

        .checkout-form {
            flex: 2;
            background: white;
            padding: 30px;
            border-radius: 8px;
            color: black;
        }

        .checkout-summary {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 8px;
            color: black;
            position: sticky;
            top: 100px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
        }

        .checkout-items {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .checkout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .checkout-item-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkout-item-img {
            width: 50px;
            height: 50px;
            border-radius: 4px;
        }

        .checkout-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .submit-order-btn {
            width: 100%;
            padding: 15px;
            background: #232323;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .submit-order-btn:hover {
            background: #404040;
        }

        @media (max-width: 768px) {
            .checkout-container {
                flex-direction: column;
            }
            .checkout-summary {
                position: static;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <div class="left">
                <a href="index.html">Каталог</a>
            </div>
            <div class="logo">
                <a href="index.html"><img src="img/logo1.png" alt=""></a>
            </div>
            <div class="right">
                <div class="cart">
                    <div class="cartButton"></div>
                    <div class="cartDropdown">
                        <p>Корзина пуста</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="checkout-container">
                <div class="checkout-form">
                    <h2>Данные покупателя</h2>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label for="fullname">ФИО</label>
                            <input type="text" id="fullname" name="fullname" required placeholder="Иван Иванович Иванов">
                        </div>
                        <div class="form-group">
                            <label for="address">Адрес доставки</label>
                            <input type="text" id="address" name="address" required placeholder="г. Москва, ул. Примерная, д. 1, кв. 1">
                        </div>
                        <div class="form-group">
                            <label for="phone">Номер телефона</label>
                            <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 000-00-00">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="example@mail.com">
                        </div>
                        <div class="form-group">
                            <label for="postalCode">Почтовый индекс</label>
                            <input type="text" id="postalCode" name="postalCode" placeholder="123456">
                        </div>
                        <button type="submit" class="submit-order-btn">Подтвердить заказ</button>
                    </form>
                </div>

                <div class="checkout-summary">
                    <h2>Ваш заказ</h2>
                    <div id="checkout-items-list" class="checkout-items">
                        <!-- Items will be injected here -->
                    </div>
                    <div id="checkout-total-price" class="checkout-total">
                        <!-- Total will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container header-inner">
            <div class="footer-top">
                <div class="footer-col">
                    <p>© 2025 Gaiti. Все права защищены</p>
                    <p>ИП Бубенцов И.А. ИНН: 213002160208</p>
                    <p><a href="#">Пользовательское соглашение</a></p>
                </div>
                <div class="footer-col">
                    <h3>Каталог</h3>
                    <a href="tshorts.html">Футболки</a>
                    <a href="shtani.html">Штаны</a>
                    <a href="kurtki.html">Куртки</a>
                    <a href="noski.html">Носки</a>
                </div>
                <div class="footer-col">
                    <h3>Покупателям</h3>
                    <a href="support.html">Поддержка</a>
                    <a href="otzivi.html">Отзывы</a>
                </div>
                <div class="footer-col">
                    <h3>Связь с нами</h3>
                    <a href="mailto:Gaiti@gmail.com">Gaiti@gmail.com</a>
                    <div class="social">
                        <a href="#"><img src="img/tg.png" alt="Telegram"></a>
                        <a href="#"><img src="img/vk.png" alt="VK"></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="scripts/products.js"></script>
    <script src="scripts/checkout.js"></script>
</body>

</html>
