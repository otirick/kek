<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="img/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Gaiti Shop</title>
</head>

<body>
    <header class="header">
        <div class="container header-inner">

            <div class="left">
                <a href="support.html">Поддержка</a>
                <a href="#">Отзывы</a>
            </div>

            <div class="logo">
                <a href="index.html"><img src="img/logo1.png" alt=""></a>
            </div>

            <div class="right">

                <div class="search">
                    <input type="checkbox" id="searchToggle" class="searchToggle" />
                    <label for="searchToggle" class="searchButton"></label>
                    <input type="text" class="searchInput" placeholder="Поиск..." />
                    <button class="submitButton"></button>
                </div>


                <div class="cart">
                    <script src="scripts/cart.js"></script>
                    <div class="cartButton"></div>
                    <div class="cartDropdown">
                        <p>Корзина пуста</p>
                    </div>
                </div>

            </div>
        </div>
    </header>
    <main>
    <div class="container header-inner">
        <div class="catalog">
            <!-- Фильтры -->
            <div class="catalog-filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="tshirt">Футболки</button>
                <button class="filter-btn" data-filter="pants">Штаны</button>
                <button class="filter-btn" data-filter="jackets">Куртки</button>
                <button class="filter-btn" data-filter="socks">Носки</button>
                <div class="filter-slider"></div>
            </div>

            <!-- Сами карточки -->
            <div class="catalog-items" id="catalog-items">
                <!-- Products will be injected here by catalog.js -->
            </div>
        </div>
    </div>
    </main>

    <footer class="footer">
        <div class="container header-inner">
            <div class="footer-top">
                <div class="footer-col">
                    <p>© 2025 Gaiti. Все права защищены</p>
                    <p>ИП Бубенцов И.А. ИНН: 213002160208</p>
                    <p><a href="#">Пользовательское соглашение</a></p>
                </div>
                <div class="footer-col">
                    <h3>Каталог</h3>
                    <a href="tshorts.html">Футболки</a>
                    <a href="shtani.html">Штаны</a>
                    <a href="kurtki.html">Куртки</a>
                    <a href="noski.html">Носки</a>
                </div>
                <div class="footer-col">
                    <h3>Покупателям</h3>
                    <a href="support.html">Поддержка</a>
                    <a href="otzivi.html">Отзывы</a>
                </div>
                <div class="footer-col">
                    <h3>Связь с нами</h3>
                    <a href="mailto:Gaiti@gmail.com">Gaiti@gmail.com</a>
                    <div class="social">
                        <a href="#"><img src="img/tg.png" alt="Telegram"></a>
                        <a href="#"><img src="img/vk.png" alt="VK"></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="scripts/products.js"></script>
    <script src="scripts/cart.js"></script>
    <script src="scripts/catalog.js"></script>
</body>
</html>
